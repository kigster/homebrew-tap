name: update-formula

# Refresh Formula/sopsy.rb (version + per-platform sha256) from a published
# sopsy release. Triggered automatically by the sopsy release workflow
# (repository_dispatch) or manually with a tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "sopsy release tag to track (e.g. v1.0.2)"
        required: true
  repository_dispatch:
    types: [sopsy-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Regenerate formula from release assets
        env:
          TAG: ${{ github.event.inputs.tag || github.event.client_payload.tag }}
        run: |
          set -euo pipefail
          : "${TAG:?a tag is required}"
          # Reject anything that is not a strict version tag. TAG can come from a
          # repository_dispatch client_payload (attacker-influenced), and it is
          # interpolated into URLs and the generated formula, so validate hard.
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$'; then
            echo "Refusing to run for suspicious tag: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          base="https://github.com/kigster/sopsy/releases/download/${TAG}"

          sha() { curl -fsSL "$1" | shasum -a 256 | awk '{print $1}'; }
          MAC_ARM=$(sha "$base/sopsy-aarch64-apple-darwin.tar.gz")
          MAC_INTEL=$(sha "$base/sopsy-x86_64-apple-darwin.tar.gz")
          LINUX_ARM=$(sha "$base/sopsy-aarch64-unknown-linux-gnu.tar.gz")
          LINUX_INTEL=$(sha "$base/sopsy-x86_64-unknown-linux-gnu.tar.gz")

          mkdir -p Formula
          cat > Formula/sopsy.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # Generated by .github/workflows/update-formula.yml — do not edit by hand.
          class Sopsy < Formula
            desc "The missing developer experience for SOPS"
            homepage "https://github.com/kigster/sopsy"
            version "${VERSION}"
            license "MIT"

            depends_on "age"
            depends_on "sops"

            on_macos do
              depends_on "age-plugin-se"

              on_arm do
                url "${base}/sopsy-aarch64-apple-darwin.tar.gz"
                sha256 "${MAC_ARM}"
              end
              on_intel do
                url "${base}/sopsy-x86_64-apple-darwin.tar.gz"
                sha256 "${MAC_INTEL}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/sopsy-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM}"
              end
              on_intel do
                url "${base}/sopsy-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_INTEL}"
              end
            end

            def install
              bin.install "sopsy"
              generate_completions_from_executable(bin/"sopsy", "completion")
            end

            test do
              assert_match "sopsy #{version}", shell_output("#{bin}/sopsy --version")
            end
          end
          EOF

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sopsy.rb
          if git diff --quiet --cached; then
            echo "Formula already up to date."
          else
            git commit -m "sopsy ${TAG#v}"
            git push
          fi
